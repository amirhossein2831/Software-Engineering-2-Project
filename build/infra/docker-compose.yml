name: ticketing-app

x-logging: &log
  LOG_LEVEL: ${LOG_LEVEL:-info}

services:
  # ---------------------------------------------------------------- infra ----
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ticketing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticketing}
      POSTGRES_DB: ${POSTGRES_DB:-ticketing}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticketing}"]
      interval: 5s
      timeout: 3s
      retries: 15
    networks: [ticketing-net]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [ticketing-net]

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [ticketing-net]

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "${MAILHOG_PORT:-8025}:8025"
    networks: [ticketing-net]

  # ------------------------------------------------------------- services ----
  auth:
    build: ../../auth
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      <<: *log
      DATABASE_URL: postgres://${POSTGRES_USER:-ticketing}:${POSTGRES_PASSWORD:-ticketing}@postgres:5432/auth?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-720h}
      KAFKA_BROKERS: kafka:9092
      AUTH_PORT: "8081"
    ports: ["8081:8081"]
    networks: [ticketing-net]

  catalog:
    build: ../../catalog
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      <<: *log
      DATABASE_URL: postgres://${POSTGRES_USER:-ticketing}:${POSTGRES_PASSWORD:-ticketing}@postgres:5432/catalog?sslmode=disable
      CATALOG_PORT: "8082"
    ports: ["8082:8082"]
    networks: [ticketing-net]

  reservation:
    build: ../../reservation
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      <<: *log
      DATABASE_URL: postgres://${POSTGRES_USER:-ticketing}:${POSTGRES_PASSWORD:-ticketing}@postgres:5432/reservation?sslmode=disable
      REDIS_ADDR: redis:6379
      HOLD_TTL_SECONDS: ${HOLD_TTL_SECONDS:-30}
      SWEEP_INTERVAL_SECONDS: ${SWEEP_INTERVAL_SECONDS:-5}
      KAFKA_BROKERS: kafka:9092
      RESERVATION_PORT: "8083"
    ports: ["8083:8083"]
    networks: [ticketing-net]

  checkout:
    build: ../../checkout
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      reservation: { condition: service_started }
      catalog: { condition: service_started }
    environment:
      <<: *log
      DATABASE_URL: postgres://${POSTGRES_USER:-ticketing}:${POSTGRES_PASSWORD:-ticketing}@postgres:5432/checkout?sslmode=disable
      RESERVATION_URL: http://reservation:8083
      CATALOG_URL: http://catalog:8082
      PAYMENT_FAIL_RATE: ${PAYMENT_FAIL_RATE:-0}
      KAFKA_BROKERS: kafka:9092
      CHECKOUT_PORT: "8084"
    ports: ["8084:8084"]
    networks: [ticketing-net]

  ticketing:
    build: ../../ticketing
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      <<: *log
      DATABASE_URL: postgres://${POSTGRES_USER:-ticketing}:${POSTGRES_PASSWORD:-ticketing}@postgres:5432/ticketing?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      CHECKOUT_TOPIC: checkout.events
      CONSUMER_GROUP: ticketing
      TICKET_SIGNING_KEY: ${TICKET_SIGNING_KEY:-dev-ticket-key}
      TICKETING_PORT: "8085"
    ports: ["8085:8085"]
    networks: [ticketing-net]

  notification:
    build: ../../notification
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      mailhog: { condition: service_started }
    environment:
      <<: *log
      DATABASE_URL: postgres://${POSTGRES_USER:-ticketing}:${POSTGRES_PASSWORD:-ticketing}@postgres:5432/notification?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      CONSUME_TOPICS: checkout.events,ticketing.events,auth.events
      CONSUMER_GROUP: notification
      SMTP_ADDR: mailhog:1025
      SMTP_FROM: no-reply@tickets.local
      NOTIFICATION_PORT: "8086"
    ports: ["8086:8086"]
    networks: [ticketing-net]

  realtime:
    build: ../../realtime
    depends_on:
      kafka: { condition: service_healthy }
    environment:
      <<: *log
      KAFKA_BROKERS: kafka:9092
      CONSUME_TOPICS: reservation.events,checkout.events,ticketing.events
      REALTIME_PORT: "8087"
    ports: ["8087:8087"]
    networks: [ticketing-net]

  waiting-room:
    build: ../../waiting-room
    depends_on:
      redis: { condition: service_healthy }
    environment:
      <<: *log
      REDIS_ADDR: redis:6379
      ADMIT_RATE_PER_SEC: ${ADMIT_RATE_PER_SEC:-5}
      ADMISSION_SECRET: ${ADMISSION_SECRET:-dev-admission-secret}
      ADMISSION_TTL_SECONDS: ${ADMISSION_TTL_SECONDS:-300}
      WAITING_ROOM_PORT: "8088"
    ports: ["8088:8088"]
    networks: [ticketing-net]

  # ---------------------------------------------------------------- edge -----
  gateway:
    build: ../../gateway
    depends_on:
      redis: { condition: service_healthy }
      auth: { condition: service_started }
      catalog: { condition: service_started }
      reservation: { condition: service_started }
      checkout: { condition: service_started }
      ticketing: { condition: service_started }
      realtime: { condition: service_started }
      waiting-room: { condition: service_started }
    environment:
      <<: *log
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      ADMISSION_SECRET: ${ADMISSION_SECRET:-dev-admission-secret}
      ADMISSION_ENFORCED: ${ADMISSION_ENFORCED:-false}
      REDIS_ADDR: redis:6379
      RATE_LIMIT: ${RATE_LIMIT:-120}
      RATE_WINDOW_SECONDS: ${RATE_WINDOW_SECONDS:-60}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-*}
      AUTH_URL: http://auth:8081
      CATALOG_URL: http://catalog:8082
      RESERVATION_URL: http://reservation:8083
      CHECKOUT_URL: http://checkout:8084
      TICKETING_URL: http://ticketing:8085
      REALTIME_URL: http://realtime:8087
      WAITING_ROOM_URL: http://waiting-room:8088
      GATEWAY_PORT: "8080"
    ports: ["8080:8080"]
    networks: [ticketing-net]

  frontend:
    build:
      context: ../../frontend
      args:
        NEXT_PUBLIC_API_URL: /api
    depends_on:
      gateway: { condition: service_started }
    networks: [ticketing-net]

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      frontend: { condition: service_started }
      gateway: { condition: service_started }
    volumes:
      - ../config/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${EDGE_PORT:-8090}:80"
    networks: [ticketing-net]

volumes:
  pgdata:

networks:
  ticketing-net:
    driver: bridge
